<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Html input type</h1>
    <form action="">
        <label for="">Name:</label>
        <input type="text" placeholder="enter name">
        <br /> <br />
        <label for="">Email:</label>
        <input type="email" placeholder="enter mail">
        <br /> <br />
        <label for="">Password:</label>
        <input type="password" placeholder=" enter password">
        <br /> <br />
        <label for="">number:</label>
        <input type="number" placeholder="">
        <br /> <br />
        <label> DOB:</label>
        <input type="date">

        <label> Month:</label>
        <input type="month">
        <label> Week:</label>
        <input type="week">

        <label for=""> Time:</label>
        <input type="time" />

        <label for=""> Time & Date:</label>
        <input type="datetime-local" />
        <br /> <br />

        <label for="gender">Gender:</label>
        <input type="radio" id="gender" name="gender">Male
        <input type="radio" id="gender" name="gender">Female
        <input type="radio" id="gender" name="gender">Other
        <br /> <br />

        <label for="">Choose Cities:</label>
        <input type="checkbox">Mumbai
        <input type="checkbox">Pune
        <input type="checkbox">Nashik
        <input type="checkbox">Jalgoan
        <br /> <br />

        <label for="">Color</label>
        <input type="color">
        <br /> <br />
        <label for="">Range</label>
        <input type="range">
        <br /> <br />
        <label for="">upload your cv</label>
        <input type="file" name="file" multiple>
        <br /> <br />
        <label for="">Select Dish</label>
        <select name="" id="">
             <option value="">Choose...</option>
            <option value="">puranpoli</option>
            <option value="">nudddels</option>
            <option value="">pizza</option>
        </select>

         <br /> <br />
         <label for="">Address</label>
         <textarea name="box" rows="3"></textarea>
         <br /> <br />
         <label for="">Search Info:</label>
         <input type="search">

         <input type="submit" value="submit">

    </form>
</body>

</html>
